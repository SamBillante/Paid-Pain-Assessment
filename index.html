<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>3D Anatomy Viewer</title>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/"
  }
}
</script>

<style>

body{
margin:0;
font-family:Arial;
}

#viewer{
width:100%;
height:600px;
min-height:320px;
position:relative;
display:block;
overflow:hidden;
}

#infoPanel{
position:absolute;
top:14px;
left:14px;
width:300px;
max-height:72%;
background:rgba(18,18,24,0.92);
color:#f8f8f8;
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.15);
border-radius:16px;
box-shadow:0 18px 50px rgba(0,0,0,0.35);
overflow:hidden;
transition:width 180ms ease, transform 180ms ease, opacity 180ms ease, max-height 180ms ease;
}

#infoPanel.collapsed{
width:200px;
max-height:60px;
transform:none;
}

#infoPanelHeader{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 14px 10px;
font-size:0.95rem;
font-weight:700;
gap:8px;
}

#infoPanelContent{
padding:0 14px 14px;
font-size:0.88rem;
line-height:1.5;
max-height:calc(72% - 56px);
overflow:auto;
}

#searchInput{
flex:1;
padding:6px 10px;
border:none;
border-radius:6px;
background:rgba(255,255,255,0.1);
color:#f8f8f8;
font-size:0.85rem;
outline:none;
min-width:100px;
}

#searchInput::placeholder{
color:#ccc;
}

#searchResults{
max-height:200px;
overflow:auto;
}

#searchResults li{
padding:6px 8px;
cursor:pointer;
border-radius:6px;
margin-bottom:2px;
}

#searchResults li:hover{
background:rgba(255,255,255,0.1);
}

#panelToggle{
width:32px;
height:32px;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.12);
color:#fff;
cursor:pointer;
font-size:1rem;
}

#panelToggle:hover{background:rgba(255,255,255,0.18);}

</style>

</head>

<body>

<div id="viewer">
  <div id="infoPanel">
    <div id="infoPanelHeader">
      <input type="text" id="searchInput" placeholder="Search...">
      <button id="panelToggle" title="Collapse info panel">‹</button>
    </div>
    <div id="infoPanelContent">
      <ul id="searchResults"></ul>
      <h3 id="partTitle" style="margin:0 0 8px 0; font-size:1rem;">Search or select a body part</h3>
      <p id="partDescription"></p>
    </div>
  </div>
</div>

<script type="module" src="viewer.js"></script>

</body>

</html>
